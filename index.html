<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <body>
        <h1>My photo lightbox gallery</h1>
        <link rel="stylesheet" href="css/style.css">
        <link href="dist/css/lightbox.css" rel="stylesheet">
    <main>
        <div class="grid">
        <a href="images/church in dublin.jpeg" data-lightbox="coding">
            <img src="images/church in dublin.jpeg" alt="church with greek lettering at the top">
        </a>

        <a href="images/dublin sign.jpeg" data-lightbox="coding">
            <img src="images/dublin sign.jpeg" alt="Dublin sign outlines with christmas lights">
        </a>

        <a href="images/hotel by trinity.jpeg" data-lightbox="coding">
            <img src="images/hotel by trinity.jpeg" alt="Hotel by trinity college in dublin with a lot of windows">
        </a>
        <a href="images/old building.jpeg" data-lightbox="coding">
            <img src="images/old building.jpeg" alt="Old building in Dublin">
        </a>
    </div>
    </main>
        <script src="dist/js/lightbox-plus-jquery.js"></script>
    </body>
</html>
